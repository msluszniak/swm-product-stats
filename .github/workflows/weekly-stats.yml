name: weekly-stats

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Collect stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run collect

      - name: Commit history and charts
        run: |
          git config user.name 'swm-stats-bot'
          git config user.email 'stats-bot@users.noreply.github.com'
          git add data/history.csv
          [ -d charts ] && git add charts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "stats: weekly update $(date -u +%Y-%m-%d)"
            git push
          fi
